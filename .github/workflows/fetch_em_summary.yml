name: Fetch EM Summary

on:
  workflow_dispatch:
    inputs:
      legislation_url:
        description: >
          legislation.gov.au URL for the Act
          (e.g. https://www.legislation.gov.au/C2015A00040/latest/versions)
        required: true
        type: string
      compilation_number:
        description: >
          Compilation number to inspect (e.g. C09 or C47).
          The script finds every Act that amended this compilation and
          retrieves a plain-English EM summary from ParlInfo.
        required: true
        type: string

jobs:
  fetch-em-summary:
    name: Retrieve EM Summary
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------------------------------------------------
      # Install system Chromium + chromedriver
      #
      # ParlInfo (parlinfo.aph.gov.au) uses an Azure WAF JS Challenge.
      # selenium-stealth drives a real Chromium instance with patched
      # automation fingerprints (navigator.webdriver=false, etc.) so the
      # challenge executes and resolves normally.
      #
      # chromium-browser and chromium-chromedriver are available as standard
      # apt packages on ubuntu-latest and install to /usr/bin/chromedriver.
      # -----------------------------------------------------------------------
      - name: Install Chromium and chromedriver
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml selenium selenium-stealth

      - name: Fetch EM Summary
        env:
          LEGISLATION_URL: ${{ inputs.legislation_url }}
          COMPILATION_NUMBER: ${{ inputs.compilation_number }}
        run: |
          python fetch_em_summary.py \
            "$LEGISLATION_URL" \
            "$COMPILATION_NUMBER"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: em-summary-report
          path: em_summaries/
          retention-days: 30
          if-no-files-found: warn
